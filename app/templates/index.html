<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gene Structure Visualizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Заголовок -->
        <header class="header">
            <h1><i class="fas fa-dna"></i> Gene Structure Visualizer</h1>
        </header>

        <!-- Форма построения гена -->
        <section class="build-section">
            <h2><i class="fas fa-wrench"></i> Построить ген</h2>
            <div class="build-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="source">Источник данных:</label>
                        <select id="source" class="form-control">
                            <option value="ensembl">Ensembl</option>
                            <option value="ncbi">NCBI</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="geneId">ID гена:</label>
                        <input type="text" id="geneId" class="form-control" placeholder="Например: ENSG00000141510">
                    </div>
                    <div class="form-group">
                        <label for="proteinId">ID белка:</label>
                        <input type="text" id="proteinId" class="form-control" placeholder="Например: P04637">
                    </div>
                    <div class="form-group">
                    <label for="geneId">Построить ген</label>
                        <button id="buildGeneBtn" class="btn btn-primary">
                            <i class="fas fa-play"></i> Построить ген
                        </button>
                    </div>
                </div>
                <div id="buildStatus" class="status-message"></div>
            </div>
        </section>

        <!-- Основное содержимое -->
        <main class="main-content" id="geneContent" style="display: none;">
            <!-- Панель информации -->
            <div class="info-panel">
                <div class="info-card">
                    <h3><i class="fas fa-info-circle"></i> Информация о гене</h3>
                    <div id="geneInfo">
                        <!-- Будет заполнено через JavaScript -->
                    </div>
                </div>
            </div>

            <!-- Визуализация структуры гена -->
            <div class="structure-container">
                <!-- Экзоны - левая колонка -->
                <div class="structure-section exons-section">
                    <div class="section-header">
                        <h3><i class="fas fa-code"></i> Экзоны</h3>
                        <div class="section-stats">
                            <span class="stat-badge" id="exonCount">0 экзонов</span>
                        </div>
                    </div>
                    <div id="exonsContainer" class="structure-list">
                        <!-- Экзоны будут вставлены через JavaScript -->
                    </div>
                </div>
                
                <!-- Домены - правая колонка -->
                <div class="structure-section domains-section">
                    <div class="section-header">
                        <h3><i class="fas fa-shapes"></i> Домены белка</h3>
                        <div class="section-stats">
                            <span class="stat-badge" id="domainCount">0 доменов</span>
                        </div>
                    </div>
                    <div id="domainsContainer" class="structure-list">
                        <!-- Домены будут вставлены через JavaScript -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Сообщения об ошибках -->
        <div id="errorMessage" class="error-message" style="display: none;"></div>
    </div>

    <!-- Шаблоны -->
    <!-- Шаблон экзона -->
    <script type="text/template" id="exonTemplate">
        <div class="exon-card" data-exon-number="<%= number %>">
            <div class="exon-header">
                <div class="exon-meta">
                    <span class="badge">Экзон <%= number %></span>
                    <span class="position-badge">Позиция: <%= start_position+1 %>-<%= end_position+1 %></span>
                    <span class="position-badge">Начальная фаза: <%= start_phase %></span>
                    <span class="position-badge">Конечная фаза: <%= end_phase %></span>
                </div>
            </div>
            
            <!-- Последовательность -->
            <div class="sequence-content">
                <%= sequence %>
            </div>
        </div>
    </script>

    <!-- Шаблон домена -->
    <script type="text/template" id="domainTemplate">
        <div class="domain-card" data-domain-name="<%= name %>">
            <div class="domain-header">
                <div class="domain-meta">
                    <span class="badge badge-domain"><%= name %></span>
                    <% if (type !== "unknown") { %>
                        <span class="position-badge"><%= type %></span>
                    <% } %>
                    <span class="position-badge">Позиция в белке: <%= start+1 %>-<%= end+1 %></span>
                </div>
            </div>

            <!-- Последовательность -->
            <div class="sequence-content">
                <%= sequence %>
            </div>
        </div>
    </script>

    <!-- JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
